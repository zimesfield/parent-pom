name: Publish Maven Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: maven-release-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Configure Git identity
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Setup GPG TTY
        run: echo "GPG_TTY=$(tty)" >> $GITHUB_ENV

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION"

      - name: Configure Maven Central credentials
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [
              {
                "id": "central",
                "username": "${{ secrets.CENTRAL_USERNAME }}",
                "password": "${{ secrets.CENTRAL_PASSWORD }}"
              }
            ]

      - name: Build and Sign Artifacts
        run: |
          ./mvnw clean verify \
            -B \
            -Drevision=$VERSION \
            -DskipTests \
            --no-transfer-progress

      - name: Publish to Maven Central
        run: |
          ./mvnw org.sonatype.central:central-publishing-maven-plugin:0.5.0:publish \
            -Drevision=$VERSION \
            -DskipTests \
            --no-transfer-progress