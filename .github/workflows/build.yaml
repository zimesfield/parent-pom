name: Snapshot Build

on:
  pull_request:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'

  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MAVEN_OPTS: "-Xmx2g"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Compute Snapshot Version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BRANCH="pr-${GITHUB_REF##*/}"
          else
            BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          fi

          echo "REVISION=${BRANCH}-${SHORT_SHA}-SNAPSHOT" >> $GITHUB_ENV
          echo "Computed revision: $REVISION"

      - name: Set Maven Version
        run: |
          ./mvnw -B versions:set \
            -DnewVersion=${REVISION} \
            -DgenerateBackupPoms=false

      - name: Cache Maven Repo
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

      - name: Build
        run: |
          ./mvnw -B clean verify \
            -Dgpg.skip=true \
            --no-transfer-progress