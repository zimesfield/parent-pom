name: Build Snapshot Artifacts

on:
  push:
    branches:
      - feature/*
      - bugfix/*
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: maven-snapshot-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compute Snapshot Version
        run: |
          BASE_VERSION=$(grep -m1 "<version>" pom.xml | sed -E 's/.*<version>(.*)<\/version>.*/\1/')
          SNAPSHOT_VERSION="${BASE_VERSION%-SNAPSHOT}-SNAPSHOT"

          echo "VERSION=$SNAPSHOT_VERSION" >> $GITHUB_ENV
          echo "Using version: $SNAPSHOT_VERSION"

      - name: Build Only (no Central deploy for snapshots)
        run: |
          ./mvnw clean install \
            -B \
            -Drevision=${VERSION} \
            -DskipTests \
            --no-transfer-progress