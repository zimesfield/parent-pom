name: Snapshot Build

on:
  push:
    branches: [develop, feature/*, bugfix/*]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Set snapshot revision
        run: |
          echo "REVISION=${GITHUB_REF_NAME}-SNAPSHOT" >> $GITHUB_ENV

      - name: Compile
        run: |
          ./mvnw -B clean compile \
            -Drevision=${REVISION} \
            --no-transfer-progress

      - name: Build & Install
        run: |
          ./mvnw -B install \
            -Drevision=${REVISION} \
            -DskipTests \
            --no-transfer-progress