name: Publish Maven Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Configure Maven Central credentials
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [
              {
                "id": "central",
                "username": "${{ secrets.CENTRAL_USERNAME }}",
                "password": "${{ secrets.CENTRAL_PASSWORD }}"
              }
            ]

      - name: Get Version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set Maven Version
        run: |
          ./mvnw versions:set -DnewVersion=${VERSION} -DgenerateBackupPoms=false

      - name: Build
        run: |
          ./mvnw clean verify --no-transfer-progress

      - name: Publish to Maven Central
        run: |
          ./mvnw org.sonatype.central:central-publishing-maven-plugin:publish --no-transfer-progress