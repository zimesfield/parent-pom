name: Publish Maven Release

on:
  push:
    tags:
      - 'v*'
      - 'main'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Configure Maven Central credentials
        uses: s4u/maven-settings-action@v4.0.0
        with:
          servers: |
            [
              {
                "id": "central",
                "username": "${{ secrets.CENTRAL_USERNAME }}",
                "password": "${{ secrets.CENTRAL_PASSWORD }}"
              }
            ]

      - name: Extract version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION"

      - name: Clean
        run: ./mvnw clean

      - name: Remove old artifacts
        run: rm -rf ~/.m2/repository/com/zimesfield

      - name: Publish
        run: |
          ./mvnw -B \
            clean verify \
            org.sonatype.central:central-publishing-maven-plugin:publish \
            -Drevision=0.0.1 \
            -DskipTests \
            --no-transfer-progress
          
